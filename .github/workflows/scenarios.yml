name: Windowed Scenario Suite

# Validates the project's player-facing feature gate per CLAUDE.md.
# Runs the windowed scenario suite under Xvfb (Linux virtual display) so the
# real rendering pipeline executes — sidesteps macOS backgrounded-window
# stale-frame issues.
#
# Four jobs:
#   1. headless-audit       — run_pretrigger_tests.sh (fast logic gate).
#   2. coverage-validation  — check_coverage.py (sub-second sanity check).
#   3. multipeer-tests      — run_multiplayer_tests.sh (host/client sync).
#   4. windowed-scenarios   — run_scenarios.sh under Xvfb (UI gate).

on:
  push:
    branches: [ '**' ]
    paths:
      - '40k/**'
      - '.github/workflows/scenarios.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '40k/**'
  workflow_dispatch:

env:
  # Pinned to match the existing test-suite.yml. Local dev is on 4.6.stable;
  # if a scenario or audit test depends on 4.6-only behaviour, bump this.
  # Both jobs share this version so audit + multipeer + windowed are
  # consistent.
  GODOT_VERSION: "4.4.1"

jobs:
  headless-audit:
    name: Headless audit suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Verify Godot
        run: godot --version

      - name: Import project
        run: |
          cd 40k
          timeout 180 godot --headless --import || true
          timeout 180 godot --headless --import || true

      - name: Run audit suite
        run: |
          bash 40k/tests/run_pretrigger_tests.sh

  coverage-validation:
    name: Coverage matrix validation
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate coverage.json ↔ scenarios
        run: |
          python3 40k/tests/check_coverage.py

  multipeer-tests:
    name: Multi-peer integration (GUT)
    runs-on: ubuntu-latest
    # 39 tests, each booting two windowed Godot instances with a real
    # connection handshake, legitimately needs ~15 min on a 2-core runner;
    # 20 minutes was borderline once honest readiness gating landed.
    timeout-minutes: 30
    needs: headless-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Xvfb + GL stack
        run: |
          # The multi-peer harness drives the game via TestModeHandler's
          # UI navigation (clicks the multiplayer button, host button, etc.),
          # so spawned host/client peers need a real display. Mirror the
          # windowed-scenarios job's display stack.
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb \
            x11-xserver-utils \
            libxinerama1 libxcursor1 libxi6 libxrandr2 \
            libgl1 libglu1-mesa \
            libegl1 libgles2 \
            mesa-utils

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Capture real Godot path + build xvfb-run shim
        run: |
          REAL_GODOT="$(command -v godot)"
          echo "Real godot: $REAL_GODOT"
          if [ -z "$REAL_GODOT" ]; then
            echo "::error::godot not on PATH after chickensoft setup"
            exit 1
          fi

          # IMPORTANT: chickensoft installs godot to $HOME/bin/godot, and
          # run_multiplayer_tests.sh prepends $HOME/bin to PATH (line 19),
          # which would override any shim placed in $HOME/.local/bin.
          # Replace the binary in-place: move the real binary aside and
          # write the xvfb-run shim where the script expects to find godot.
          REAL_RENAMED="${REAL_GODOT}.real"
          mv "$REAL_GODOT" "$REAL_RENAMED"
          cat > "$REAL_GODOT" <<EOF
          #!/bin/bash
          # xvfb-run shim — wraps every godot invocation in a virtual
          # display. The harness's auto-host / auto-join flow drives real
          # menu navigation (MainMenu → MultiplayerLobby) which needs a
          # display server even though the test asserts hit the underlying
          # GameState via TestModeHandler IPC.
          exec xvfb-run -a --server-args="-screen 0 1920x1080x24 +extension RANDR" \\
            "$REAL_RENAMED" \\
            --rendering-driver opengl3 \\
            --audio-driver Dummy \\
            "\$@"
          EOF
          chmod +x "$REAL_GODOT"
          "$REAL_GODOT" --version

      - name: Import project (with rendering)
        run: |
          cd 40k
          timeout 240 godot --headless --import || true
          timeout 240 godot --headless --import || true

      - name: Run multi-peer integration suite
        run: |
          bash 40k/tests/run_multiplayer_tests.sh

  windowed-scenarios:
    name: Windowed scenarios (Xvfb)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [headless-audit, coverage-validation]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Xvfb + GL stack
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb \
            x11-xserver-utils \
            libxinerama1 libxcursor1 libxi6 libxrandr2 \
            libgl1 libglu1-mesa \
            libegl1 libgles2 \
            mesa-utils

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Capture real Godot path + build xvfb-run shim
        run: |
          REAL_GODOT="$(command -v godot)"
          echo "Real godot: $REAL_GODOT"
          if [ -z "$REAL_GODOT" ]; then
            echo "::error::godot not on PATH after chickensoft setup"
            exit 1
          fi

          # IMPORTANT: chickensoft installs godot to $HOME/bin/godot, and
          # run_scenarios.sh prepends $HOME/bin to PATH (line 24), which
          # would override any shim placed in $HOME/.local/bin. Replace
          # the binary in-place: move the real binary aside and write the
          # xvfb-run shim where the script expects to find godot.
          REAL_RENAMED="${REAL_GODOT}.real"
          mv "$REAL_GODOT" "$REAL_RENAMED"
          cat > "$REAL_GODOT" <<EOF
          #!/bin/bash
          # xvfb-run shim — wraps every godot invocation in a virtual
          # display so windowed scenarios can render. Adds opengl3 +
          # Dummy audio so we don't fight Vulkan/ALSA on a headless runner.
          exec xvfb-run -a --server-args="-screen 0 1920x1080x24 +extension RANDR" \\
            "$REAL_RENAMED" \\
            --rendering-driver opengl3 \\
            --audio-driver Dummy \\
            "\$@"
          EOF
          chmod +x "$REAL_GODOT"
          "$REAL_GODOT" --version

      - name: Import project (with rendering)
        run: |
          cd 40k
          # Two import passes — first one resolves dependencies, second
          # ensures everything is reimported cleanly. Allowed to "fail"
          # (timeout/exit-code) since import returns non-zero on warnings.
          timeout 240 godot --headless --import || true
          timeout 240 godot --headless --import || true

      - name: Run windowed scenarios
        run: |
          bash 40k/tests/run_scenarios.sh --all

      - name: Upload scenario results + screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-results
          path: |
            ~/.local/share/godot/app_userdata/40k/test_results/scenarios/
          if-no-files-found: warn
