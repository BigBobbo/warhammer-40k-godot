# GitHub Actions workflow to build and deploy the native Linux (Steam Deck)
# export to itch.io. Mirrors deploy-web.yml, but pushes to the `linux` channel.
#
# On every push to main this produces a fresh Linux x86_64 build and pushes it
# to itch.io. Any Steam Deck (or Linux desktop) that installed the game via the
# **itch app** then auto-updates to the new build with no manual steps.
name: Deploy Linux Build

on:
  push:
    branches:
      - main
    paths:
      - '40k/**'
      - '.github/workflows/deploy-linux.yml'
  workflow_dispatch:  # Allow manual trigger

# Only one linux deploy at a time. A newer push cancels an in-progress run so we
# never have two butler pushes racing the same itch.io channel.
concurrency:
  group: deploy-linux
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.4.1"
  EXPORT_NAME: "Warhammer40K"
  ITCH_USERNAME: "oisinrob"
  ITCH_GAME: "warhammer40k-simulator"

jobs:
  # Build the native Linux export
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          export-templates: false

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          cd ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          unzip -q Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          mv templates/* .
          rmdir templates
          rm Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          ls -la

      - name: Create server config
        run: |
          # Bake the production multiplayer server URL into the build, same as
          # the web deploy, so online play points at the right host.
          echo '{"server_url": "${{ secrets.WS_SERVER_URL }}"}' > 40k/server_config.local.json

      - name: Import project assets
        run: |
          cd 40k
          godot --headless --import --quit || true

      - name: Export for Linux
        run: |
          cd 40k
          mkdir -p exports/linux
          godot --headless --path . --export-release "Linux" exports/linux/Warhammer40K.x86_64
          # butler preserves the executable bit; set it here so the Deck never
          # needs a manual chmod after the itch app installs the build.
          chmod +x exports/linux/Warhammer40K.x86_64
          ls -la exports/linux

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: 40k/exports/linux/
          retention-days: 7

  # Deploy to itch.io (linux channel)
  deploy-itch:
    runs-on: ubuntu-latest
    needs: build-linux
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: linux-build

      - name: Restore executable bit
        run: chmod +x linux-build/Warhammer40K.x86_64

      - name: Install Butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_BUTLER_KEY }}
        run: |
          # This step runs under `bash -e`; `set +e` so the `out=$(butler …)`
          # assignment does not abort the step before the retry logic runs.
          set +e
          # itch.io rejects a push with a 400 ("latest build is still
          # processing, try again later") while it is still scanning the
          # previous upload. That is transient — retry with backoff.
          target="${{ env.ITCH_USERNAME }}/${{ env.ITCH_GAME }}:linux"
          attempts=6
          delay=30
          for i in $(seq 1 "$attempts"); do
            echo "::group::butler push attempt $i/$attempts"
            # Bound each push: butler can hang on a stuck channel.
            out="$(timeout -k 30 480 ./butler push linux-build "$target" 2>&1)"
            status=$?
            echo "$out"
            echo "::endgroup::"
            if [ "$status" -eq 0 ]; then
              echo "butler push succeeded on attempt $i"
              exit 0
            fi
            if [ "$status" -eq 124 ] || echo "$out" | grep -q "still processing"; then
              if [ "$status" -eq 124 ]; then
                echo "butler push timed out (itch.io likely has a build stuck processing); retrying in ${delay}s…"
              else
                echo "itch.io is still processing the previous build; retrying in ${delay}s…"
              fi
              sleep "$delay"
              delay=$((delay * 2))
              continue
            fi
            echo "butler push failed with a non-transient error (see output above)"
            exit "$status"
          done
          echo "::error::butler push still failing after $attempts attempts — itch.io's linux channel likely has a build stuck in 'processing'. Check the itch.io dashboard for the warhammer40k-simulator project and clear/cancel any stuck build, then re-run this workflow."
          exit 1

      - name: Deployment Summary
        run: |
          echo "## Linux Build Deployed to itch.io" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Game: ${{ env.ITCH_GAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- Channel: linux" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
