<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warhammer 40K — Army Builder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div id="boot-overlay" class="loading-overlay">Loading dataset…</div>

  <div id="app" class="app"></div>

  <footer class="page-footer">
    <p>
      Powered by <a href="https://40kdc.alpacasoft.dev" target="_blank" rel="noopener">40kdc-data</a>
      (Alpaca Software and the 40kdc community contributors, CC BY 4.0)
      · Lists save to the <a href="/api/health">w40k relay server</a> and appear in the game's army menu.
    </p>
  </footer>

  <!-- Legacy loose-format text parser (fallback import path; classic script). -->
  <script src="/js/parser.js"></script>

  <script type="module">
    import('/js/builder/main.js')
      .then(() => document.getElementById('boot-overlay').remove())
      .catch((err) => {
        const el = document.getElementById('boot-overlay');
        el.textContent = 'Failed to load the army builder: ' + err.message;
        el.classList.add('boot-error');
        console.error(err);
      });
  </script>
</body>
</html>
